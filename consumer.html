const { useState, useRef, useCallback, useEffect } = React;

/* Lucide icon shim. Uses lucide.createElement() imperatively inside a ref-owned
   container so React never has to reconcile a node that Lucide replaced behind its back
   (the DOM-replacement approach used by lucide.createIcons() conflicts with React). */
function toPascalCase(kebab) {
  return kebab.split("-").map((s) => s.charAt(0).toUpperCase() + s.slice(1)).join("");
}
function Icon({ name, size = 16, color, strokeWidth = 2, style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const pascal = toPascalCase(name);
    const iconNode = window.lucide && window.lucide[pascal];
    ref.current.innerHTML = "";
    if (iconNode) {
      const svg = window.lucide.createElement(iconNode);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke", color || "currentColor");
      svg.setAttribute("stroke-width", strokeWidth);
      svg.style.display = "block";
      ref.current.appendChild(svg);
    }
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} style={{ display: "inline-flex", width: size, height: size, flexShrink: 0, ...style }} />;
}

function getMenuForMerchant(merchant) {
  const items = MENU_TEMPLATES[merchant.cat] || MENU_TEMPLATES.retail;
  const multiplier = { 1: 0.7, 2: 1, 3: 1.5, 4: 2.3 }[merchant.priceRange] || 1;
  return items.map((item, i) => ({
    name: item.name,
    desc: item.desc,
    price: Math.round(item.base * multiplier * 100) / 100,
    imgSeed: `cboxxitem${merchant.id}-${i}`,
  }));
}

function useSwipeQueue(items, filterKey) {
  const [queue, setQueue] = useState(items);
  const [saved, setSaved] = useState([]);
  useEffect(() => {
    setQueue(items);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [filterKey]);
  const advance = useCallback((direction, item) => {
    setQueue((q) => q.filter((m) => m.id !== item.id));
    if (direction === "right") setSaved((s) => [...s, item]);
  }, []);
  return { queue, saved, advance, setSaved };
}

function MerchantCard({ merchant, index, onSwipe, isTop, onOpenMenu }) {
  const cardRef = useRef(null);
  const [drag, setDrag] = useState({ x: 0, active: false });
  const startX = useRef(0);
  const [gone, setGone] = useState(null);
  const [flipped, setFlipped] = useState(false);
  const [menuIndex, setMenuIndex] = useState(0);
  const menuScrollRef = useRef(null);
  const handleMenuScroll = () => {
    const el = menuScrollRef.current;
    if (!el || el.clientWidth === 0) return;
    setMenuIndex(Math.round(el.scrollLeft / el.clientWidth));
  };
  const downPos = useRef({ x: 0, y: 0, time: 0 });

  const iconName = CATEGORIES.find((c) => c.key === merchant.cat)?.icon ?? "sparkles";
  const [c1, c2] = CARD_PALETTE[merchant.id % CARD_PALETTE.length];
  const cardMenu = getMenuForMerchant(merchant);

  const onPointerDown = (e) => {
    if (!isTop || flipped) return;
    const clientX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
    const clientY = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    startX.current = clientX;
    downPos.current = { x: clientX, y: clientY, time: Date.now() };
    setDrag({ x: 0, active: true });
    cardRef.current?.setPointerCapture?.(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!drag.active || flipped) return;
    const x = (e.clientX ?? e.touches?.[0]?.clientX ?? 0) - startX.current;
    setDrag({ x, active: true });
  };
  const releaseTo = (direction) => {
    setGone(direction);
    setTimeout(() => onSwipe(direction, merchant), 220);
  };
  const onPointerUp = (e) => {
    if (!drag.active || flipped) return;
    if (drag.x > 90) { releaseTo("right"); return; }
    if (drag.x < -90) { releaseTo("left"); return; }

    // Not a swipe — check if this was a quick tap (vs. an aborted drag) landing on the photo,
    // which flips the card to reveal the menu.
    const clientX = e.clientX ?? e.changedTouches?.[0]?.clientX ?? downPos.current.x;
    const clientY = e.clientY ?? e.changedTouches?.[0]?.clientY ?? downPos.current.y;
    const moved = Math.hypot(clientX - downPos.current.x, clientY - downPos.current.y);
    const elapsed = Date.now() - downPos.current.time;
    if (moved < 8 && elapsed < 500 && cardRef.current) {
      const rect = cardRef.current.getBoundingClientRect();
      const relativeY = downPos.current.y - rect.top;
      if (relativeY <= rect.height * 0.48) setFlipped(true);
    }
    setDrag({ x: 0, active: false });
  };

  const rotate = drag.x / 18;
  const flyX = gone === "right" ? 480 : gone === "left" ? -480 : drag.x;
  const flyRot = gone === "right" ? 20 : gone === "left" ? -20 : rotate;
  const opacity = gone ? 0 : 1;

  return (
    <div
      ref={cardRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
      style={{
        position: "absolute",
        inset: 0,
        transform: `translate(${flyX}px, ${index * 8}px) rotate(${flyRot}deg) scale(${1 - index * 0.035})`,
        transition: drag.active ? "none" : "transform 320ms cubic-bezier(.2,.8,.3,1), opacity 320ms",
        opacity,
        touchAction: flipped ? "pan-x" : "none",
        cursor: isTop ? "grab" : "default",
        zIndex: 50 - index,
        perspective: 1200,
      }}
    >
      <div
        style={{
          width: "100%",
          height: "100%",
          position: "relative",
          transformStyle: "preserve-3d",
          transition: "transform 480ms cubic-bezier(.3,.7,.4,1)",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
        }}
      >
        {/* FRONT FACE */}
        <div
          style={{
            position: "absolute", inset: 0,
            backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
            borderRadius: 20,
            overflow: "hidden",
            background: "#FFFFFF",
            boxShadow: "0 18px 40px -14px rgba(33,29,23,0.35)",
            display: "flex",
            flexDirection: "column",
            border: "1px solid rgba(33,29,23,0.06)",
          }}
        >
          <div
            style={{
              height: "48%",
              background: `linear-gradient(135deg, ${c1}, ${c2})`,
              position: "relative",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              overflow: "hidden",
            }}
          >
            <img
              src={`https://picsum.photos/seed/cboxx${merchant.id}/500/400`}
              alt=""
              style={{
                position: "absolute", inset: 0, width: "100%", height: "100%",
                objectFit: "cover", mixBlendMode: "luminosity", opacity: 0.55,
              }}
            />
            <div style={{ position: "absolute", inset: 0, background: `linear-gradient(135deg, ${c1}cc, ${c2}cc)` }} />
            <Icon name={iconName} size={64} color="rgba(255,255,255,0.92)" strokeWidth={1.4} style={{ position: "relative" }} />
            <div
              style={{
                position: "absolute",
                top: 14,

                background: "rgba(255,255,255,0.9)",

function QRRedeem({ merchant, offer, onClose }) {
  const [seconds, setSeconds] = useState(600);
  useState(() => {
    const t = setInterval(() => setSeconds((s) => (s > 0 ? s - 1 : 0)), 1000);
    return () => clearInterval(t);
  });
  const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
  const ss = String(seconds % 60).padStart(2, "0");

  // deterministic pseudo-QR pattern, purely illustrative
  const cells = [];
  let seed = merchant.id * 977 + 13;
  for (let i = 0; i < 121; i++) {
    seed = (seed * 9301 + 49297) % 233280;
    cells.push(seed / 233280 > 0.52);
  }

  return (
    <div
      style={{
        position: "absolute",
        inset: 0,
        background: "rgba(33,29,23,0.55)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 200,
        borderRadius: 28,
      }}

      <div
        style={{
          width: "84%",
          background: "#FFFFFF",
          borderRadius: 18,
          padding: "22px 20px 18px",
          textAlign: "center",
          position: "relative",
          boxShadow: "0 20px 50px rgba(0,0,0,0.35)",
        }}
      >
        <button
          onClick={onClose}
          style={{
            position: "absolute",
            top: 12,
            right: 12,
            background: "none",
            border: "none",
            color: "#6B6357",
            cursor: "pointer",
          }}
        >
          <Icon name="x" size={18} />
        </button>
        <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, letterSpacing: 1, color: "#6B6357", margin: "0 0 4px", textTransform: "uppercase" }}>
          Show at counter
        </p>
        <h4 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 600, margin: "0 0 14px", color: "#211D17" }}>
          {merchant.name}
        </h4>
        <div
          style={{
            display: "grid",
            gridTemplateColumns: "repeat(11, 1fr)",
            gap: 2,
            width: 154,
            height: 154,
            margin: "0 auto 14px",
            background: "#211D17",
            padding: 8,
            borderRadius: 8,
          }}
        >
          {cells.map((on, i) => (
            <div key={i} style={{ background: on ? "#F4F1EB" : "#211D17", borderRadius: 1 }} />
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, color: "#7A0013", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>
          <Icon name="clock" size={14} />
          <span>Expires in {mm}:{ss}</span>
        </div>
        <p style={{ fontFamily: "'Work Sans', sans-serif", fontSize: 12.5, color: "#6B6357", marginTop: 10 }}>
          {offer}
        </p>
      </div>
    </div>
  );

  const [redeemedRewards, setRedeemedRewards] = useState(new Set());
  const [contactForm, setContactForm] = useState({ name: "", email: "", message: "" });
  const [contactSent, setContactSent] = useState(false);
  const [phoneNumber] = useState("+65 9123 4567"); // sample — set at NFC tap 2FA, never used as the stored ID
  const [memberIdHash, setMemberIdHash] = useState("computing…");

  useEffect(() => {
    let cancelled = false;
    async function hashPhone() {
      try {
        const enc = new TextEncoder().encode(phoneNumber);
        const digest = await crypto.subtle.digest("SHA-256", enc);
        const hex = Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
        if (!cancelled) setMemberIdHash(hex.slice(0, 20));
      } catch {
        if (!cancelled) setMemberIdHash("hash unavailable");
      }
    }
    hashPhone();
    return () => { cancelled = true; };
  }, [phoneNumber]);

  const filtered = MERCHANTS
    .filter((m) => (liveMode ? true : m.region === region))
    .filter((m) => (activeCats.size ? activeCats.has(m.cat) : true))
    .filter((m) => (search.trim() ? (m.name + " " + m.offers.join(" ")).toLowerCase().includes(search.toLowerCase()) : true))
    .slice()
    .sort((a, b) => (liveMode ? a.distanceKm - b.distanceKm : 0));

  const filterKey = `${region}|${liveMode}|${Array.from(activeCats).sort().join(",")}|${search.trim().toLowerCase()}`;
  const { queue, saved, advance } = useSwipeQueue(filtered, filterKey);

  const [pendingCats, setPendingCats] = useState(new Set());
  const togglePendingCat = (key) => {
    setPendingCats((prev) => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  };
  const openFilterModal = () => {
    setPendingCats(new Set(activeCats));
    setShowFilters(true);
  };
  const applyFilters = () => {
    setActiveCats(new Set(pendingCats));
    setShowFilters(false);

  const handleSwipe = (direction, merchant) => {
    advance(direction, merchant);
    setLastAction({ direction, name: merchant.name });
    setTimeout(() => setLastAction(null), 1400);

  const redeemReward = (reward) => {
    if (redeemedRewards.has(reward.id) || points < reward.cost) return;
    setPoints((p) => p - reward.cost);
    setRedeemedRewards((s) => new Set(s).add(reward.id));

                    style={{
                      display: "flex", alignItems: "center", gap: 12, border: "none",
                      borderBottom: "1px solid #E3D9C4", background: "none", cursor: "pointer",
                      padding: "13px 4px", textAlign: "left", width: "100%",
                    }}
                  >
                    <div
                      style={{
                        width: 34, height: 34, borderRadius: 9, flexShrink: 0,
                        background: active ? "#9C0018" : "#EAE6DE",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}
                    >
                      <Icon name={catIconName} size={16} color={active ? "#F4F1EB" : "#9C0018"} />
                    </div>
                    <span style={{ flex: 1, fontFamily: "'Work Sans', sans-serif", fontSize: 14, fontWeight: 600, color: "#241512" }}>
                      {label}
                    </span>
                    <div
                      style={{
                        width: 20, height: 20, borderRadius: 6, flexShrink: 0,
                        border: active ? "none" : "1.5px solid #C9BFA8",
                        background: active ? "#165932" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}
                    >
                      {active && <Icon name="check" size={13} color="#F4F1EB" />}
                    </div>
                  </button>
                );
              })}
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <button
                onClick={clearPendingFilters}
                style={{
                  flex: 1, border: "1.5px solid #C9BFA8", borderRadius: 12, padding: "12px 0",
                  background: "none", color: "#6B6357", fontFamily: "'Work Sans', sans-serif",
                  fontSize: 13, fontWeight: 600, cursor: "pointer",
                }}
              >
                Clear all
              </button>
              <button
                onClick={applyFilters}
                style={{
                  flex: 2, border: "none", borderRadius: 12, padding: "12px 0",
                  background: "#9C0018", color: "#F4F1EB", fontFamily: "'Work Sans', sans-serif",
                  fontSize: 13, fontWeight: 700, cursor: "pointer",
                }}
              >
                Apply{pendingCats.size ? ` (${pendingCats.size})` : ""}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* body */}
      <div style={{ flex: 1, position: "relative", padding: 18 }}>
        {mainView === "feed" && feedMode === "discover" && (
          <>
            <div style={{ position: "relative", height: 470 }}>
              {queue.length === 0 && (
                <div
                  style={{
                    position: "absolute",
                    inset: 0,
                    borderRadius: 20,
                    border: "1.5px dashed #C9BFA8",
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 8,
                    color: "#6B6357",
                    textAlign: "center",
                    padding: 24,
                  }}
                >
                  <Icon name="compass" size={26} />
                  <p style={{ fontFamily: "'Fraunces', serif", fontSize: 16, color: "#211D17", margin: 0 }}>
                    {liveMode ? "Nothing nearby right now" : `Nothing here in ${region} right now`}
                  </p>
                  <p style={{ fontSize: 12.5, margin: 0 }}>Try another region, clear your filters, or search something else.</p>
                </div>
              )}
              {queue.slice(0, 3).map((m, i) => (
                <MerchantCard key={m.id} merchant={m} index={i} isTop={i === 0} onSwipe={handleSwipe} onOpenMenu={setMenuTarget} />
              ))}
            </div>

            {queue.length > 0 && (
              <div style={{ display: "flex", justifyContent: "center", gap: 22, marginTop: 18 }}>
                <button
                  onClick={() => handleSwipe("left", queue[0])}
                  style={{
                    width: 52, height: 52, borderRadius: "50%", border: "1.5px solid #E3D9C4",
                    background: "#FFFFFF", color: "#7A0013", display: "flex", alignItems: "center",
                    justifyContent: "center", cursor: "pointer", boxShadow: "0 6px 16px rgba(33,29,23,0.1)",
                  }}
                >
                  <Icon name="x" size={22} />
                </button>
                <button
                  onClick={() => handleSwipe("right", queue[0])}
                  style={{
                    width: 52, height: 52, borderRadius: "50%", border: "none",
                    background: "#165932", color: "#F4F1EB", display: "flex", alignItems: "center",
                    justifyContent: "center", cursor: "pointer", boxShadow: "0 6px 16px rgba(22,89,50,0.35)",
                  }}
                >
                  <Icon name="heart" size={22} />
                </button>
              </div>
            )}

            {lastAction && (
              <div
                style={{
                  position: "absolute", bottom: 84, left: "50%", transform: "translateX(-50%)",
                  background: "#211D17", color: "#F4F1EB", padding: "8px 16px", borderRadius: 999,
                  fontSize: 12.5, fontFamily: "'Work Sans', sans-serif", whiteSpace: "nowrap",
                }}
              >
                {lastAction.direction === "right" ? `Saved ${lastAction.name}` : `Passed on ${lastAction.name}`}
              </div>
            )}
          </>
        )}

        {mainView === "feed" && feedMode === "loyalty" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ background: "#9C0018", borderRadius: 18, padding: 18, color: "#F4F1EB" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1, opacity: 0.7, margin: 0, textTransform: "uppercase" }}>
                    Points balance
                  </p>
                  <p style={{ fontFamily: "'Fraunces', serif", fontSize: 30, fontWeight: 700, margin: "2px 0 0" }}>{points}</p>
                </div>
                <Icon name="award" size={30} color="#D4A832" strokeWidth={1.6} />
              </div>
              <div style={{ marginTop: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, opacity: 0.75, marginBottom: 5, fontFamily: "'Work Sans', sans-serif" }}>
                  <span>Heartland Member</span>
                  <span>{Math.max(nextTier - points, 0)} pts to Neighbourhood Gold</span>
                </div>
                <div style={{ height: 6, background: "rgba(247,241,230,0.18)", borderRadius: 999, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${tierProgress * 100}%`, background: "#D4A832", borderRadius: 999 }} />
                </div>
              </div>
            </div>

            <div>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 16.5, color: "#211D17", margin: "0 0 10px" }}>
                Redeem with points
              </h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {LOYALTY_REWARDS.map((reward) => {
                  const redeemed = redeemedRewards.has(reward.id);
                  const affordable = points >= reward.cost;
                  return (
                    <div
                      key={reward.id}
                      style={{
                        display: "flex", alignItems: "center", gap: 12, background: "#FFFFFF",
                        borderRadius: 14, padding: 12, border: "1px solid rgba(33,29,23,0.06)",
                        opacity: redeemed ? 0.55 : 1,
                      }}
                    >
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: "#EAE6DE", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, overflow: "hidden", position: "relative" }}>
                        <img
                          src={`https://picsum.photos/seed/cboxxreward${reward.id}/100/100`}
                          alt=""
                          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", opacity: 0.35 }}
                        />
                        <Icon name="gift" size={18} color="#9C0018" style={{ position: "relative" }} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 13.5, fontWeight: 600, color: "#211D17" }}>{reward.name}</p>
                        <p style={{ margin: "2px 0 0", fontSize: 11.5, color: "#6B6357" }}>{reward.merchant}</p>
                      </div>
                      <button
                        onClick={() => redeemReward(reward)}
                        disabled={redeemed || !affordable}
                        style={{
                          border: "none", borderRadius: 10, padding: "7px 11px", fontSize: 11,
                          fontWeight: 700, cursor: redeemed || !affordable ? "default" : "pointer",
                          fontFamily: "'IBM Plex Mono', monospace", flexShrink: 0,
                          background: redeemed ? "#EAE6DE" : affordable ? "#D4A832" : "#EDE7D8",
                          color: redeemed ? "#9C0018" : affordable ? "#211D17" : "#B3AA97",
                          display: "flex", alignItems: "center", gap: 4,
                        }}
                      >
                        {redeemed ? <><Icon name="check" size={12} /> DONE</> : `${reward.cost} PTS`}
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {mainView === "savedTab" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 18, color: "#211D17", margin: "2px 0 6px" }}>
              Saved for you ({saved.length})
            </h3>
            {saved.length === 0 && (
              <p style={{ fontSize: 13, color: "#6B6357" }}>Swipe right on a promo in Discover to save it here.</p>
            )}
            {saved.map((m) => {
              const iconName = CATEGORIES.find((c) => c.key === m.cat)?.icon ?? "sparkles";
              return (
                <div
                  key={m.id}
                  style={{
                    background: "#FFFFFF", borderRadius: 14, padding: 12,
                    border: "1px solid rgba(33,29,23,0.06)", display: "flex", flexDirection: "column", gap: 9,
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 9, background: "#EAE6DE", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, overflow: "hidden", position: "relative" }}>
                      <img
                        src={`https://picsum.photos/seed/cboxx${m.id}/100/100`}
                        alt=""
                        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", opacity: 0.35 }}
                      />
                      <Icon name={iconName} size={17} color="#9C0018" style={{ position: "relative" }} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{ margin: 0, fontFamily: "'Fraunces', serif", fontSize: 14.5, fontWeight: 600, color: "#211D17" }}>{m.name}</p>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 1 }}>
                        <p style={{ margin: 0, fontSize: 11, color: "#6B6357" }}>{m.offers.length} offer{m.offers.length > 1 ? "s" : ""}</p>
                        <span style={{ opacity: 0.4, fontSize: 11 }}>·</span>
                        <PriceTag priceRange={m.priceRange} color="#9C0018" dim="#D9CFC0" />
                      </div>
                    </div>
                    <button
                      onClick={() => setMenuTarget(m)}
                      style={{
                        border: "1px solid #E3D9C4", background: "none", borderRadius: 8, padding: "5px 9px",
                        fontSize: 10.5, fontWeight: 700, color: "#9C0018", cursor: "pointer", flexShrink: 0,
                        fontFamily: "'IBM Plex Mono', monospace",
                      }}
                    >
                      MENU
                    </button>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {m.offers.map((offer, i) => (
                      <div
                        key={i}
                        style={{
                          display: "flex", alignItems: "center", gap: 8, background: "#F4F1EB",
                          borderRadius: 9, padding: "7px 8px 7px 10px",
                        }}
                      >
                        <p style={{ flex: 1, margin: 0, fontSize: 12, color: "#241512", lineHeight: 1.3 }}>{offer}</p>
                        <button
                          onClick={() => setRedeemTarget({ merchant: m, offer })}
                          style={{
                            background: "#D4A832", border: "none", borderRadius: 8, padding: "6px 10px",
                            fontSize: 10.5, fontWeight: 700, color: "#211D17", cursor: "pointer", flexShrink: 0,
                            fontFamily: "'IBM Plex Mono', monospace",
                          }}
                        >
                          REDEEM
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {mainView === "profileTab" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 18, color: "#211D17", margin: "2px 0 0" }}>Your CBOXX</h3>
            <div style={{ background: "#9C0018", borderRadius: 16, padding: 16, color: "#F4F1EB" }}>
              <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1, opacity: 0.7, margin: 0, textTransform: "uppercase" }}>
                Member
              </p>
              <p style={{ fontFamily: "'Fraunces', serif", fontSize: 20, margin: "4px 0 2px" }}>
                {phoneNumber.slice(0, phoneNumber.length - 4).replace(/\d/g, "•")}{phoneNumber.slice(-4)}
              </p>
              <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9.5, opacity: 0.6, margin: "0 0 10px", wordBreak: "break-all" }}>
                ID (SHA-256): {memberIdHash}…
              </p>
              <div style={{ display: "flex", gap: 18 }}>
                <div>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, margin: 0, fontWeight: 600 }}>{saved.length}</p>
                  <p style={{ fontSize: 10.5, opacity: 0.75, margin: 0 }}>Saved</p>
                </div>
                <div>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, margin: 0, fontWeight: 600 }}>{redeemedRewards.size}</p>
                  <p style={{ fontSize: 10.5, opacity: 0.75, margin: 0 }}>Rewards redeemed</p>
                </div>
                <div>
                  <p style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, margin: 0, fontWeight: 600 }}>{region}</p>
                  <p style={{ fontSize: 10.5, opacity: 0.75, margin: 0 }}>Home region</p>
                </div>
              </div>
            </div>
            <p style={{ fontSize: 11.5, color: "#6B6357", lineHeight: 1.5 }}>
              Entry via NFC tap or QR triggers a one-time phone verification. Your phone number is never stored or used as your ID directly — only its SHA-256 hash is, shown above. This session is illustrative only — no real member data.
            </p>
          </div>
        )}

        {mainView === "contactTab" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 18, color: "#241512", margin: "2px 0 6px" }}>Contact us</h3>
              <p style={{ fontSize: 12.5, color: "#6B6357", margin: 0, lineHeight: 1.5 }}>
                We build your customer base, not just your loyalty programme. Questions about a promo, a merchant, or your account — reach out below.
              </p>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <a
                href="mailto:info@cboxxsg.com"
                style={{
                  display: "flex", alignItems: "center", gap: 12, background: "#FFFFFF", borderRadius: 14,
                  padding: 12, border: "1px solid rgba(33,29,23,0.06)", textDecoration: "none",
                }}
              >
                <div style={{ width: 40, height: 40, borderRadius: 10, background: "#EAE6DE", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon name="mail" size={18} color="#9C0018" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ margin: 0, fontFamily: "'Work Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#241512" }}>Email</p>
                  <p style={{ margin: "1px 0 0", fontSize: 12, color: "#6B6357" }}>info@cboxxsg.com</p>
                </div>
              </a>
              <div
                style={{
                  display: "flex", alignItems: "center", gap: 12, background: "#FFFFFF", borderRadius: 14,
                  padding: 12, border: "1px solid rgba(33,29,23,0.06)",
                }}
              >
                <div style={{ width: 40, height: 40, borderRadius: 10, background: "#EAE6DE", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon name="map-pin" size={18} color="#9C0018" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ margin: 0, fontFamily: "'Work Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#241512" }}>CBOXX Pte. Ltd.</p>
                  <p style={{ margin: "1px 0 0", fontSize: 12, color: "#6B6357" }}>Singapore · UEN 202619369N</p>
                </div>
              </div>
            </div>

            <div>
              <h4 style={{ fontFamily: "'Fraunces', serif", fontSize: 14.5, color: "#241512", margin: "4px 0 10px" }}>Send a message</h4>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <input
                  value={contactForm.name}
                  onChange={(e) => setContactForm((f) => ({ ...f, name: e.target.value }))}
                  placeholder="Your name"
                  style={{
                    border: "1px solid #E3D9C4", borderRadius: 10, padding: "10px 12px", fontSize: 13,
                    fontFamily: "'Work Sans', sans-serif", outline: "none", background: "#FFFFFF", color: "#241512",
                  }}
                />
                <input
                  value={contactForm.email}
                  onChange={(e) => setContactForm((f) => ({ ...f, email: e.target.value }))}
                  placeholder="Your email"
                  style={{
                    border: "1px solid #E3D9C4", borderRadius: 10, padding: "10px 12px", fontSize: 13,
                    fontFamily: "'Work Sans', sans-serif", outline: "none", background: "#FFFFFF", color: "#241512",
                  }}
                />
                <textarea
                  value={contactForm.message}
                  onChange={(e) => setContactForm((f) => ({ ...f, message: e.target.value }))}
                  placeholder="How can we help?"
                  rows={3}
                  style={{
                    border: "1px solid #E3D9C4", borderRadius: 10, padding: "10px 12px", fontSize: 13,
                    fontFamily: "'Work Sans', sans-serif", outline: "none", resize: "none", background: "#FFFFFF", color: "#241512",
                  }}
                />
                <button
                  onClick={submitContact}
                  style={{
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
                    border: "none", borderRadius: 10, padding: "11px 0", fontSize: 13, fontWeight: 700,
                    fontFamily: "'Work Sans', sans-serif", cursor: "pointer",
                    background: contactSent ? "#165932" : "#9C0018", color: "#F4F1EB",
                    transition: "background 200ms",
                  }}
                >
                  {contactSent ? <><Icon name="check" size={15} /> Message sent</> : <><Icon name="send" size={14} /> Send message</>}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* bottom nav */}
      <div style={{ display: "flex", borderTop: "1px solid rgba(33,29,23,0.08)", background: "#FFFFFF" }}>
        {[
          { key: "feed", label: feedMode === "loyalty" ? "Loyalty" : "Discover", icon: feedMode === "loyalty" ? "award" : "compass" },
          { key: "savedTab", label: "Saved", icon: "bookmark" },
          { key: "contactTab", label: "Contact", icon: "message-circle" },
          { key: "profileTab", label: "Profile", icon: "user" },
        ].map(({ key, label, icon }) => (
          <button
            key={key}
            onClick={() => setMainView(key)}
            style={{
              flex: 1, border: "none", background: "none", padding: "10px 0 12px",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              color: mainView === key ? "#9C0018" : "#B3AA97", cursor: "pointer",
            }}
          >
            <Icon name={icon} size={19} />
            <span style={{ fontSize: 10.5, fontFamily: "'Work Sans', sans-serif", fontWeight: 600 }}>{label}</span>
          </button>
        ))}
      </div>

      {redeemTarget && (
        <QRRedeem merchant={redeemTarget.merchant} offer={redeemTarget.offer} onClose={() => setRedeemTarget(null)} />
      )}
      {menuTarget && <MenuModal merchant={menuTarget} onClose={() => setMenuTarget(null)} />}
    </div>
  );
}


function App() {
  return <ConsumerDashboard />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  var src = document.getElementById("app-source").textContent;
  var compiled = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  }).code;
  (0, eval)(compiled);
</script>
</body>
</html>
